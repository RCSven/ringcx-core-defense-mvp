<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1220" viewBox="0 0 1900 1220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7ff"/>
      <stop offset="52%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#fff5ea"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#24405f"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#10233f" flood-opacity="0.15"/>
    </filter>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; }
      .title { font-size: 48px; font-weight: 900; fill: #10233f; }
      .sub { font-size: 23px; font-weight: 650; fill: #617184; }
      .h { font-size: 25px; font-weight: 900; fill: #10233f; }
      .b { font-size: 18px; font-weight: 650; fill: #617184; }
      .s { font-size: 15px; font-weight: 750; fill: #617184; }
      .box { fill: rgba(255,255,255,.96); stroke: #d9e5ef; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .blue { fill: #eff7ff; stroke: #9bc8f8; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .green { fill: #f0fbf6; stroke: #a5dfb7; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .orange { fill: #fff5e9; stroke: #ffc17d; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .red { fill: #fff1f1; stroke: #f0a3a3; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .purple { fill: #f4f1ff; stroke: #b7a8ff; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .decision { fill: #fff8df; stroke: #ffc83d; stroke-width: 3; filter: url(#shadow); }
      .line { fill: none; stroke: #24405f; stroke-width: 4; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #ff7a1a; stroke-width: 4; stroke-dasharray: 10 9; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #91a8bd; stroke-width: 3; marker-end: url(#arrow); }
      .label { font-size: 16px; font-weight: 850; fill: #24405f; }
      .chip { fill: #10233f; rx: 999; }
      .chip-text { font-size: 17px; font-weight: 900; fill: #fff; }
    </style>
  </defs>

  <rect width="1900" height="1220" fill="url(#bg)"/>
  <circle cx="1590" cy="160" r="190" fill="#1f7ae0" opacity="0.08"/>
  <circle cx="260" cy="1020" r="240" fill="#ff7a1a" opacity="0.08"/>

  <text x="70" y="82" class="title">RingCX Core Defense - Logic Model</text>
  <text x="72" y="124" class="sub">核心规则：挑战带有 skill tags；角色有 skill affinity；防守结果由匹配度、等级、协作、小游戏表现共同决定</text>

  <rect x="70" y="180" width="360" height="165" class="blue"/>
  <text x="100" y="228" class="h">Player Setup</text>
  <text x="100" y="262" class="b">选择 Defender: PM / QA / SE / SDET</text>
  <text x="100" y="290" class="b">选择 Track: Technical / Management</text>
  <text x="100" y="318" class="s">初始化 Level、Energy、Evidence、Team Trust</text>

  <rect x="545" y="180" width="360" height="165" class="orange"/>
  <text x="575" y="228" class="h">Wave Director</text>
  <text x="575" y="262" class="b">根据当前阶段生成敌人</text>
  <text x="575" y="290" class="b">控制 lane、强度、组合、Boss</text>
  <text x="575" y="318" class="s">避免重复，保证每类敌人都出现</text>

  <rect x="1020" y="180" width="395" height="165" class="red"/>
  <text x="1050" y="228" class="h">Attacker Object</text>
  <text x="1050" y="262" class="b">source: Customer / Boss / Quality / Meeting</text>
  <text x="1050" y="290" class="b">tags: routing, coding, risk, roadmap...</text>
  <text x="1050" y="318" class="s">specificLock 可要求某角色主防</text>

  <rect x="1530" y="180" width="300" height="165" class="green"/>
  <text x="1560" y="228" class="h">Defense Action</text>
  <text x="1560" y="262" class="b">选择主防角色</text>
  <text x="1560" y="290" class="b">可投入辅助角色 / 技能卡</text>
  <text x="1560" y="318" class="s">消耗 Energy 或 cooldown</text>

  <rect x="260" y="470" width="390" height="170" class="purple"/>
  <text x="290" y="518" class="h">Skill Match Engine</text>
  <text x="290" y="552" class="b">baseScore = Σ attacker.tags × role.affinity</text>
  <text x="290" y="580" class="b">levelBonus + evidenceBonus + assistBonus</text>
  <text x="290" y="608" class="s">不是角色强弱，是场景适配度</text>

  <polygon points="910,455 1110,555 910,655 710,555" class="decision"/>
  <text x="826" y="545" class="h">Specific Lock?</text>
  <text x="818" y="577" class="b">是否必须指定角色?</text>

  <rect x="1280" y="470" width="390" height="170" class="red"/>
  <text x="1310" y="518" class="h">Lock Rule</text>
  <text x="1310" y="552" class="b">主防角色不匹配则无法清除</text>
  <text x="1310" y="580" class="b">其他角色只能提供 assistBonus</text>
  <text x="1310" y="608" class="s">例：需求会议追问必须 PM 主防</text>

  <rect x="70" y="760" width="360" height="165" class="green"/>
  <text x="100" y="808" class="h">Mini-game Trigger</text>
  <text x="100" y="842" class="b">关键挑战或升级时触发</text>
  <text x="100" y="870" class="b">VIP Route / Risk Sweep / Debug Trace</text>
  <text x="100" y="898" class="s">小游戏结果影响本轮 defense score</text>

  <rect x="545" y="760" width="360" height="165" class="box"/>
  <text x="575" y="808" class="h">Round Resolution</text>
  <text x="575" y="842" class="b">score ≥ threshold: clear attacker</text>
  <text x="575" y="870" class="b">score &lt; threshold: Trust / SLA 受损</text>
  <text x="575" y="898" class="s">记录 learned pattern 和 replay reason</text>

  <rect x="1020" y="760" width="360" height="165" class="orange"/>
  <text x="1050" y="808" class="h">Progression</text>
  <text x="1050" y="842" class="b">获得 Evidence / XP / Skill Point</text>
  <text x="1050" y="870" class="b">解锁职业技能或协作卡</text>
  <text x="1050" y="898" class="s">不同角色的成长路线不同</text>

  <polygon points="1640,740 1815,842 1640,945 1465,842" class="decision"/>
  <text x="1566" y="832" class="h">Promotion?</text>
  <text x="1550" y="864" class="b">Evidence 是否达标?</text>

  <rect x="365" y="1030" width="430" height="120" class="red"/>
  <text x="395" y="1077" class="h">Fail / Not Ready</text>
  <text x="395" y="1111" class="b">留在当前职级，进入更有针对性的补强 wave</text>

  <rect x="1075" y="1030" width="430" height="120" class="green"/>
  <text x="1105" y="1077" class="h">Pass / Level Up</text>
  <text x="1105" y="1111" class="b">提升职级，敌人组合更复杂，解锁新技能</text>

  <path d="M430 262 H540" class="line"/>
  <path d="M905 262 H1015" class="line"/>
  <path d="M1415 262 H1525" class="line"/>
  <path d="M1680 345 C1610 410 1515 435 1430 470" class="line"/>
  <path d="M1680 345 C1370 405 740 420 455 470" class="line"/>
  <path d="M650 555 H710" class="line"/>
  <path d="M1110 555 H1275" class="line"/>
  <text x="1140" y="532" class="label">yes</text>
  <path d="M910 655 C860 705 780 730 725 760" class="line"/>
  <text x="830" y="718" class="label">no / after lock</text>
  <path d="M1475 640 C1390 710 1120 728 905 760" class="line"/>
  <path d="M430 842 H540" class="line"/>
  <path d="M905 842 H1015" class="line"/>
  <path d="M1380 842 H1460" class="line"/>
  <path d="M1640 945 C1610 990 1520 1010 1505 1030" class="line"/>
  <path d="M1465 842 C1230 970 900 985 795 1030" class="loop"/>
  <text x="980" y="996" class="label">not ready</text>
  <path d="M580 1030 C470 930 430 770 455 640" class="loop"/>
  <path d="M1290 1030 C1180 965 1090 925 1200 925" class="thin"/>
  <path d="M1505 1090 C1730 1030 1835 700 1680 345" class="loop"/>
  <text x="1580" y="1098" class="label">harder wave deck</text>

  <rect x="70" y="380" width="240" height="48" class="chip"/>
  <text x="95" y="411" class="chip-text">Data Driven Rules</text>
  <text x="330" y="410" class="s">defenders.js + attackers.js + miniGames.js + progression.js</text>
</svg>
