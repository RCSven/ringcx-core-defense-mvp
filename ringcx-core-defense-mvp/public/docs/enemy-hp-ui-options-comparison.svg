<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1180" viewBox="0 0 1680 1180" role="img" aria-label="Enemy HP UI options comparison for RingCX Core Defense">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#fff4ea"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f9ff"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10233f"/>
      <stop offset="1" stop-color="#184f91"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#58d8ff" stop-opacity=".28"/>
      <stop offset=".7" stop-color="#58d8ff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#58d8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#10233f" flood-opacity=".14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#10233f" flood-opacity=".14"/>
    </filter>
    <style>
      .title { font: 900 56px 'Arial Black', Impact, sans-serif; fill: #10233f; }
      .subtitle { font: 500 24px Inter, Arial, sans-serif; fill: #5a6a7c; }
      .panelTitle { font: 900 24px 'Arial Black', Impact, sans-serif; fill: #10233f; }
      .panelSub { font: 500 17px Inter, Arial, sans-serif; fill: #5e6f81; }
      .label { font: 900 18px Inter, Arial, sans-serif; fill: #10233f; }
      .small { font: 700 15px Inter, Arial, sans-serif; fill: #5e6f81; }
      .pick { font: 900 16px Inter, Arial, sans-serif; fill: #ffffff; }
      .note { font: 800 15px Inter, Arial, sans-serif; fill: #10233f; }
    </style>
  </defs>

  <rect width="1680" height="1180" fill="url(#bg)"/>
  <rect x="24" y="24" width="1632" height="1132" rx="34" fill="rgba(255,255,255,.66)" stroke="rgba(16,35,63,.08)" filter="url(#shadow)"/>

  <text x="70" y="108" class="title">Enemy HP UI Options</text>
  <text x="70" y="148" class="subtitle">前提: 怪物已经有自己的步行动画，本体不再套大外框。这里只比较血量状态层怎么挂。</text>

  <!-- panel helper -->
  <g transform="translate(60 210)" filter="url(#shadow)">
    <rect width="500" height="860" rx="28" fill="url(#panel)" stroke="#d7e3ef"/>
    <text x="28" y="48" class="panelTitle">A. 头顶细血条</text>
    <text x="28" y="78" class="panelSub">最稳，最直觉，但多怪时上方会有点挤</text>

    <rect x="28" y="108" width="444" height="470" rx="26" fill="#eaf4ff" stroke="#c8ddf3"/>
    <path d="M62 310C142 244 228 252 286 318S404 386 444 324" fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round"/>
    <path d="M62 310C142 244 228 252 286 318S404 386 444 324" fill="none" stroke="#6f98cf" stroke-width="34" stroke-linecap="round" opacity=".9"/>
    <path d="M92 282l34-10-8 24M248 330l30 18-26 12M392 336l28-12-4 28" fill="none" stroke="#304d76" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity=".78"/>

    <!-- customer -->
    <g transform="translate(88 252)">
      <rect x="2" y="0" width="62" height="9" rx="5" fill="#d7e0ea"/>
      <rect x="2" y="0" width="42" height="9" rx="5" fill="#ff6b57"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/customer-risk/walk-2.png" x="0" y="18" width="76" height="106" preserveAspectRatio="xMidYMid meet"/>
      <ellipse cx="38" cy="116" rx="26" ry="8" fill="#10233f" opacity=".16"/>
    </g>

    <!-- hotfix -->
    <g transform="translate(218 318)">
      <rect x="0" y="0" width="64" height="9" rx="5" fill="#d7e0ea"/>
      <rect x="0" y="0" width="26" height="9" rx="5" fill="#ff6b57"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/hotfix-bug/walk-3.png" x="2" y="14" width="82" height="78" preserveAspectRatio="xMidYMid meet"/>
      <ellipse cx="42" cy="90" rx="24" ry="7" fill="#10233f" opacity=".16"/>
    </g>

    <!-- boss -->
    <g transform="translate(316 180)">
      <rect x="0" y="0" width="116" height="12" rx="6" fill="#d7e0ea"/>
      <rect x="0" y="0" width="74" height="12" rx="6" fill="#ff6b57"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/trust-audit-boss/walk-1.png" x="-8" y="18" width="148" height="154" preserveAspectRatio="xMidYMid meet"/>
      <ellipse cx="68" cy="160" rx="48" ry="12" fill="#10233f" opacity=".16"/>
    </g>

    <rect x="28" y="610" width="444" height="96" rx="18" fill="#f8fbff" stroke="#d7e3ef"/>
    <text x="50" y="648" class="label">优点</text>
    <text x="50" y="676" class="small">最容易理解，第一眼就知道谁快死了</text>
    <text x="50" y="700" class="small">和 boss / elite 兼容性最好</text>

    <rect x="28" y="726" width="444" height="96" rx="18" fill="#fff8f6" stroke="#f0d8d2"/>
    <text x="50" y="764" class="label">问题</text>
    <text x="50" y="792" class="small">多怪密集时，头顶条带会堆在一起</text>
    <text x="50" y="816" class="small">会稍微破坏“战场电影感”</text>

    <rect x="28" y="836" width="162" height="38" rx="16" fill="url(#navy)"/>
    <text x="109" y="861" text-anchor="middle" class="pick">稳妥方案</text>
  </g>

  <g transform="translate(590 210)" filter="url(#shadow)">
    <rect width="500" height="860" rx="28" fill="url(#panel)" stroke="#d7e3ef"/>
    <text x="28" y="48" class="panelTitle">B. 脚下弧形血环</text>
    <text x="28" y="78" class="panelSub">最像 HI 战场版，不挡脸、不挡身体</text>

    <rect x="28" y="108" width="444" height="470" rx="26" fill="#eaf4ff" stroke="#c8ddf3"/>
    <path d="M62 310C142 244 228 252 286 318S404 386 444 324" fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round"/>
    <path d="M62 310C142 244 228 252 286 318S404 386 444 324" fill="none" stroke="#6f98cf" stroke-width="34" stroke-linecap="round" opacity=".9"/>
    <path d="M92 282l34-10-8 24M248 330l30 18-26 12M392 336l28-12-4 28" fill="none" stroke="#304d76" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity=".78"/>

    <g transform="translate(88 252)">
      <ellipse cx="38" cy="116" rx="34" ry="10" fill="#10233f" opacity=".14"/>
      <path d="M12 116A26 9 0 1 1 64 116" fill="none" stroke="#d7e0ea" stroke-width="6" stroke-linecap="round"/>
      <path d="M12 116A26 9 0 0 1 48 110" fill="none" stroke="#ff6b57" stroke-width="6" stroke-linecap="round"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/customer-risk/walk-2.png" x="0" y="8" width="76" height="106" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <g transform="translate(218 318)">
      <ellipse cx="42" cy="90" rx="30" ry="9" fill="#10233f" opacity=".14"/>
      <path d="M16 90A26 9 0 1 1 68 90" fill="none" stroke="#d7e0ea" stroke-width="6" stroke-linecap="round"/>
      <path d="M16 90A26 9 0 0 1 34 84" fill="none" stroke="#ff6b57" stroke-width="6" stroke-linecap="round"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/hotfix-bug/walk-3.png" x="2" y="10" width="82" height="78" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <g transform="translate(316 180)">
      <circle cx="68" cy="166" r="52" fill="url(#glowBlue)"/>
      <ellipse cx="68" cy="160" rx="56" ry="14" fill="#10233f" opacity=".14"/>
      <path d="M20 160A48 13 0 1 1 116 160" fill="none" stroke="#d7e0ea" stroke-width="8" stroke-linecap="round"/>
      <path d="M20 160A48 13 0 0 1 88 150" fill="none" stroke="#ff6b57" stroke-width="8" stroke-linecap="round"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/trust-audit-boss/walk-1.png" x="-8" y="14" width="148" height="154" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <rect x="28" y="610" width="444" height="96" rx="18" fill="#f8fbff" stroke="#d7e3ef"/>
    <text x="50" y="648" class="label">优点</text>
    <text x="50" y="676" class="small">状态层和怪物本体完全分离，看起来最高级</text>
    <text x="50" y="700" class="small">不挡表情和动作，战场会更干净</text>

    <rect x="28" y="726" width="444" height="96" rx="18" fill="#fff8f6" stroke="#f0d8d2"/>
    <text x="50" y="764" class="label">问题</text>
    <text x="50" y="792" class="small">第一次看不如头顶血条直觉</text>
    <text x="50" y="816" class="small">要避免和脚底阴影混成选中圈</text>

    <rect x="28" y="836" width="182" height="38" rx="16" fill="#10b8c8"/>
    <text x="119" y="861" text-anchor="middle" class="pick">HI 风格最佳</text>
  </g>

  <g transform="translate(1120 210)" filter="url(#shadow)">
    <rect width="500" height="860" rx="28" fill="url(#panel)" stroke="#d7e3ef"/>
    <text x="28" y="48" class="panelTitle">B + C. 血环 + 受击增强</text>
    <text x="28" y="78" class="panelSub">常驻脚下环，挨打时头顶短暂 pop 出微型血条</text>

    <rect x="28" y="108" width="444" height="470" rx="26" fill="#eaf4ff" stroke="#c8ddf3"/>
    <path d="M62 310C142 244 228 252 286 318S404 386 444 324" fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round"/>
    <path d="M62 310C142 244 228 252 286 318S404 386 444 324" fill="none" stroke="#6f98cf" stroke-width="34" stroke-linecap="round" opacity=".9"/>
    <path d="M92 282l34-10-8 24M248 330l30 18-26 12M392 336l28-12-4 28" fill="none" stroke="#304d76" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity=".78"/>

    <g transform="translate(88 252)">
      <rect x="4" y="-4" width="54" height="8" rx="4" fill="#d7e0ea" opacity=".92"/>
      <rect x="4" y="-4" width="26" height="8" rx="4" fill="#ff6b57" opacity=".92"/>
      <ellipse cx="38" cy="116" rx="34" ry="10" fill="#10233f" opacity=".14"/>
      <path d="M12 116A26 9 0 1 1 64 116" fill="none" stroke="#d7e0ea" stroke-width="6" stroke-linecap="round"/>
      <path d="M12 116A26 9 0 0 1 48 110" fill="none" stroke="#ff6b57" stroke-width="6" stroke-linecap="round"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/customer-risk/walk-2.png" x="0" y="8" width="76" height="106" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <g transform="translate(218 318)">
      <ellipse cx="42" cy="90" rx="30" ry="9" fill="#10233f" opacity=".14"/>
      <path d="M16 90A26 9 0 1 1 68 90" fill="none" stroke="#d7e0ea" stroke-width="6" stroke-linecap="round"/>
      <path d="M16 90A26 9 0 0 1 34 84" fill="none" stroke="#ff6b57" stroke-width="6" stroke-linecap="round"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/hotfix-bug/walk-3.png" x="2" y="10" width="82" height="78" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <g transform="translate(316 180)">
      <rect x="8" y="-6" width="120" height="12" rx="6" fill="#d7e0ea"/>
      <rect x="8" y="-6" width="76" height="12" rx="6" fill="#ff6b57"/>
      <circle cx="68" cy="166" r="52" fill="url(#glowBlue)"/>
      <ellipse cx="68" cy="160" rx="56" ry="14" fill="#10233f" opacity=".14"/>
      <path d="M20 160A48 13 0 1 1 116 160" fill="none" stroke="#d7e0ea" stroke-width="8" stroke-linecap="round"/>
      <path d="M20 160A48 13 0 0 1 88 150" fill="none" stroke="#ff6b57" stroke-width="8" stroke-linecap="round"/>
      <image href="../assets/sprites/high-dev-standard/alpha/enemies/trust-audit-boss/walk-1.png" x="-8" y="14" width="148" height="154" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <text x="254" y="436" text-anchor="middle" class="note">受击时血条短暂亮起，平时不抢戏</text>

    <rect x="28" y="610" width="444" height="96" rx="18" fill="#f8fbff" stroke="#d7e3ef"/>
    <text x="50" y="648" class="label">优点</text>
    <text x="50" y="676" class="small">平时干净，开打时又足够清楚</text>
    <text x="50" y="700" class="small">最适合高动画版本的节奏感</text>

    <rect x="28" y="726" width="444" height="96" rx="18" fill="#fff8f6" stroke="#f0d8d2"/>
    <text x="50" y="764" class="label">问题</text>
    <text x="50" y="792" class="small">实现比 A/B 稍复杂，需要 on-hit 状态层</text>
    <text x="50" y="816" class="small">要控制好别让微型血条频繁闪烁过头</text>

    <rect x="28" y="836" width="216" height="38" rx="16" fill="url(#navy)"/>
    <text x="136" y="861" text-anchor="middle" class="pick">我最推荐的组合</text>
  </g>

  <g transform="translate(60 1100)">
    <rect width="1560" height="28" rx="14" fill="#10233f" opacity=".08"/>
    <rect width="1060" height="28" rx="14" fill="#10b8c8" opacity=".48"/>
    <text x="1080" y="-10" class="subtitle">推荐顺序: B + C &gt; B &gt; A</text>
  </g>
</svg>
